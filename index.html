<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="robots" content="noindex, nofollow">
  <meta name="referrer" content="no-referrer">
  <title>Reading List</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 0 0 100px;
    }

    header {
      background: #1a1a2e;
      padding: 20px 16px 16px;
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid #2a2a4a;
    }

    header h1 {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    .stats {
      font-size: 13px;
      color: #888;
    }

    .tabs {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: #0f0f1a;
      position: sticky;
      top: 73px;
      z-index: 9;
    }

    .tab {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid #2a2a4a;
      background: transparent;
      color: #888;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab.active {
      background: #3a3aff;
      border-color: #3a3aff;
      color: #fff;
    }

    .list {
      padding: 8px 16px;
    }

    .item {
      background: #1a1a2e;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      border: 1px solid #2a2a4a;
      transition: opacity 0.3s;
    }

    .item.read {
      opacity: 0.5;
    }

    .item-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .checkbox {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #3a3aff;
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .checkbox.checked {
      background: #3a3aff;
    }

    .checkbox.checked::after {
      content: '';
      width: 6px;
      height: 10px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
      margin-bottom: 2px;
    }

    .item-content {
      flex: 1;
      min-width: 0;
    }

    .item-title {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 4px;
      word-wrap: break-word;
    }

    .item.read .item-title {
      text-decoration: line-through;
      color: #888;
    }

    .item-source {
      font-size: 12px;
      color: #3a8aff;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-meta {
      font-size: 12px;
      color: #666;
      display: flex;
      gap: 12px;
    }

    .item-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-icon {
      background: none;
      border: none;
      color: #666;
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s;
    }

    .btn-icon:hover { color: #ff4444; }

    .fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #3a3aff;
      border: none;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(58, 58, 255, 0.4);
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }

    .fab:active { transform: scale(0.92); }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 30;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: #1a1a2e;
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 40px;
      width: 100%;
      max-width: 500px;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .modal h2 {
      font-size: 20px;
      margin-bottom: 20px;
      color: #fff;
    }

    .modal label {
      font-size: 13px;
      color: #888;
      display: block;
      margin-bottom: 6px;
    }

    .modal input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #2a2a4a;
      background: #0f0f1a;
      color: #fff;
      font-size: 16px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    .modal input:focus {
      border-color: #3a3aff;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    .modal-buttons button {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-cancel {
      background: #2a2a4a;
      color: #888;
    }

    .btn-save {
      background: #3a3aff;
      color: #fff;
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #555;
    }

    .empty p:first-child {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .open-link {
      display: inline-block;
      margin-top: 8px;
      font-size: 13px;
      color: #3a8aff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>Reading List</h1>
    <div class="stats" id="stats"></div>
  </header>

  <div class="tabs">
    <button class="tab active" data-filter="unread">Unread</button>
    <button class="tab" data-filter="all">All</button>
    <button class="tab" data-filter="read">Done</button>
  </div>

  <div class="list" id="list"></div>

  <button class="fab" id="fabAdd">+</button>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2 id="modalTitle">Add Link</h2>
      <label for="inputUrl">URL</label>
      <input type="url" id="inputUrl" placeholder="https://wsj.com/article/...">
      <label for="inputTitle">Title (optional)</label>
      <input type="text" id="inputTitle" placeholder="Article title">
      <div class="modal-buttons">
        <button class="btn-cancel" id="btnCancel">Cancel</button>
        <button class="btn-save" id="btnSave">Save</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'reading_list';
    let items = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    let currentFilter = 'unread';
    let editingId = null;

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function getDomain(url) {
      try { return new URL(url).hostname.replace('www.', ''); }
      catch { return url; }
    }

    function formatDate(ts) {
      const d = new Date(ts);
      const now = new Date();
      const diff = now - d;
      if (diff < 86400000) {
        const hrs = Math.floor(diff / 3600000);
        if (hrs === 0) return 'Just now';
        return `${hrs}h ago`;
      }
      if (diff < 604800000) {
        const days = Math.floor(diff / 86400000);
        return `${days}d ago`;
      }
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: d.getFullYear() !== now.getFullYear() ? 'numeric' : undefined });
    }

    function updateStats() {
      const total = items.length;
      const done = items.filter(i => i.read).length;
      document.getElementById('stats').textContent = total === 0 ? 'No articles saved' : `${done}/${total} read`;
    }

    function render() {
      const list = document.getElementById('list');
      let filtered = items;
      if (currentFilter === 'unread') filtered = items.filter(i => !i.read);
      else if (currentFilter === 'read') filtered = items.filter(i => i.read);

      filtered.sort((a, b) => b.addedAt - a.addedAt);

      if (filtered.length === 0) {
        const msgs = {
          unread: ['Nothing to read', 'Tap + to add an article'],
          read: ['No completed reads yet', 'Mark articles as done to see them here'],
          all: ['Your list is empty', 'Tap + to save your first article']
        };
        list.innerHTML = `<div class="empty"><p>${msgs[currentFilter][0]}</p><p>${msgs[currentFilter][1]}</p></div>`;
      } else {
        list.innerHTML = filtered.map(item => `
          <div class="item ${item.read ? 'read' : ''}" data-id="${item.id}">
            <div class="item-top">
              <div class="checkbox ${item.read ? 'checked' : ''}" onclick="toggleRead('${item.id}')"></div>
              <div class="item-content">
                <div class="item-title">${escapeHtml(item.title || getDomain(item.url))}</div>
                <div class="item-source">${escapeHtml(getDomain(item.url))}</div>
                <div class="item-meta">
                  <span>Added ${formatDate(item.addedAt)}</span>
                  ${item.readAt ? `<span>Read ${formatDate(item.readAt)}</span>` : ''}
                </div>
                <a href="${escapeHtml(item.url)}" target="_blank" rel="noopener" class="open-link">Open article &#8599;</a>
              </div>
              <div class="item-actions">
                <button class="btn-icon" onclick="editItem('${item.id}')" title="Edit">&#9998;</button>
                <button class="btn-icon" onclick="deleteItem('${item.id}')" title="Delete">&times;</button>
              </div>
            </div>
          </div>
        `).join('');
      }
      updateStats();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function toggleRead(id) {
      const item = items.find(i => i.id === id);
      if (item) {
        item.read = !item.read;
        item.readAt = item.read ? Date.now() : null;
        save();
        render();
      }
    }

    function deleteItem(id) {
      if (confirm('Delete this article?')) {
        items = items.filter(i => i.id !== id);
        save();
        render();
      }
    }

    function editItem(id) {
      const item = items.find(i => i.id === id);
      if (item) {
        editingId = id;
        document.getElementById('inputUrl').value = item.url;
        document.getElementById('inputTitle').value = item.title || '';
        document.getElementById('modalTitle').textContent = 'Edit Link';
        document.getElementById('modal').classList.add('open');
        document.getElementById('inputUrl').focus();
      }
    }

    function openModal() {
      editingId = null;
      document.getElementById('inputUrl').value = '';
      document.getElementById('inputTitle').value = '';
      document.getElementById('modalTitle').textContent = 'Add Link';
      document.getElementById('modal').classList.add('open');
      document.getElementById('inputUrl').focus();
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      editingId = null;
    }

    function saveItem() {
      const url = document.getElementById('inputUrl').value.trim();
      const title = document.getElementById('inputTitle').value.trim();
      if (!url) return;

      // Add protocol if missing
      let finalUrl = url;
      if (!/^https?:\/\//i.test(finalUrl)) {
        finalUrl = 'https://' + finalUrl;
      }

      if (editingId) {
        const item = items.find(i => i.id === editingId);
        if (item) {
          item.url = finalUrl;
          item.title = title;
        }
      } else {
        items.push({
          id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
          url: finalUrl,
          title: title,
          addedAt: Date.now(),
          read: false,
          readAt: null
        });
      }

      save();
      closeModal();
      render();
    }

    // Event listeners
    document.getElementById('fabAdd').addEventListener('click', openModal);
    document.getElementById('btnCancel').addEventListener('click', closeModal);
    document.getElementById('btnSave').addEventListener('click', saveItem);
    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeModal();
    });

    // Enter key to save
    document.querySelectorAll('.modal input').forEach(input => {
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') saveItem();
      });
    });

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentFilter = tab.dataset.filter;
        render();
      });
    });

    // Check for shared URL via query param (from iOS Shortcut)
    const params = new URLSearchParams(window.location.search);
    const sharedUrl = params.get('url');
    const sharedTitle = params.get('title');
    if (sharedUrl) {
      document.getElementById('inputUrl').value = decodeURIComponent(sharedUrl);
      document.getElementById('inputTitle').value = sharedTitle ? decodeURIComponent(sharedTitle) : '';
      document.getElementById('modalTitle').textContent = 'Add Link';
      document.getElementById('modal').classList.add('open');
      // Clean the URL so refreshing doesn't re-trigger
      window.history.replaceState({}, '', window.location.pathname);
    }

    render();

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
